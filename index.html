<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }
    button {
      padding: 10px 20px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>🚀 My Telegram Mini App</h1>
<p id="user"></p>

<button onclick="sendData()">Send Data</button>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  // user info
  let user = tg.initDataUnsafe.user;
  if(user){
    document.getElementById("user").innerText =
      "Hello, " + user.first_name;
  }

  function sendData(){
    tg.sendData("Button clicked!");
  }
</script>

</body>
</html>
